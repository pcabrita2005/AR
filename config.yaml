global:
  seed: 42
  device: "auto" 
  num_workers: 1
  verbose: true

environment:
  board_height: 6
  board_width: 7
  win_length: 4

dqn:
  # Architecture
  hidden_dim: 128
  channel_sizes: [128]
  kernel_sizes: [4]
  stride_sizes: [1]
  head_hidden_sizes: [64, 64]
  use_dueling_head: false
  
  # Learning
  learning_rate: 0.0001
  batch_size: 256
  replay_buffer_size: 100000
  min_replay_size: 256
  gamma: 0.99
  
  # Exploration
  epsilon_start: 1.0
  epsilon_end: 0.1
  epsilon_decay_rate: 0.9998
  warmup_episodes: 40
  
  # Target network
  target_update_freq: 1
  tau: 0.01
  
  # Self-play
  opponent_pool_size: 6
  opponent_refresh_interval: 30
  opponent_epsilon: 0.05
  random_opponent_fraction: 0.05
  heuristic_opponent_fraction: 0.45
  self_play_min_episodes_before_early_stop: 100
  self_play_early_stop_patience_evals: 2

  # Tutorial-style population training
  population_size: 1
  episodes_per_epoch: 10
  evo_epochs: 1
  evo_loop: 50
  max_steps_per_episode: 500
  tournament_size: 1

  # Tutorial-style mutation settings
  no_mutation_prob: 1.0
  mutation_lr_prob: 0.0
  mutation_batch_prob: 0.0
  mutation_learn_step_prob: 0.0
  mutation_grow_factor: 1.5
  mutation_shrink_factor: 0.75
  mutation_min_lr: 0.0001
  mutation_max_lr: 0.01
  mutation_min_batch_size: 8
  mutation_max_batch_size: 64
  mutation_min_learn_step: 1
  mutation_max_learn_step: 120

  # Training limits
  episodes: 500
  learn_step: 1
  gradient_updates_per_step: 1
  use_horizontal_symmetry_augmentation: true
  
  # Evaluation
  eval_interval: 30
  eval_games: 12
  checkpoint_score_heuristic_weight: 6.0

ppo:
  # Architecture
  hidden_dim: 256
  channel_sizes: [64, 128]
  kernel_sizes: [4, 3]
  stride_sizes: [1, 1]
  head_hidden_sizes: [256, 128]
  
  # Learning
  learning_rate: 0.00015
  batch_size: 64              # Total batch size (rollout_episodes * steps)
  minibatch_size: 64
  n_epochs: 6
  gamma: 0.99
  gae_lambda: 0.95
  clip_ratio: 0.15
  entropy_coeff: 0.015
  value_coeff: 0.5
  max_grad_norm: 0.5
  target_kl: 0.03
  
  # Rollout collection
  rollout_length: 128
  rollout_episodes_per_update: 12
  use_horizontal_symmetry_augmentation: true
  anneal_learning_rate: true
  
  # Self-play
  opponent_pool_size: 8
  warmup_episodes: 0
  random_opponent_fraction: 0.05
  heuristic_opponent_fraction: 0.35
  reward_shaping: true
  reward_shaping_scale: 8.0
  threat_bonus_scale: 0.35
  opponent_threat_penalty_scale: 0.60
  blocked_threat_bonus_scale: 0.75
  allowed_threat_penalty_scale: 1.10
  center_control_scale: 0.10
  imitation_loss_coeff: 0.40
  enable_policy_bootstrap: true
  bootstrap_samples: 12000
  bootstrap_batch_size: 256
  bootstrap_epochs: 6
  bootstrap_learning_rate: 0.0003
  bootstrap_teacher_kind: "strong"
  curriculum_profile: "tutorial"
  freeze_feature_extractor_lessons: 0
  self_play_min_episodes_before_early_stop: 60
  self_play_early_stop_patience_evals: 2
  
  # Training limits
  episodes: 720
  
  # Evaluation
  eval_interval: 30
  eval_games: 24
  checkpoint_score_heuristic_weight: 5.0

alphazero:
  episodes: 800
  learning_rate: 0.001
  weight_decay: 0.0001
  batch_size: 128
  replay_capacity: 20000
  replay_warmup_games: 12
  update_epochs: 1
  updates_per_episode: 2
  n_filters: 64
  n_res_blocks: 4
  mcts_simulations: 48
  mcts_start_search_iter: 12
  mcts_max_search_iter: 48
  mcts_search_increment: 1
  eval_mcts_simulations: 80
  c_puct: 2.0
  dirichlet_alpha: 1.0
  dirichlet_epsilon: 0.25
  temperature: 1.25
  temperature_drop_move: 8
  eval_interval: 40
  eval_games: 16
  seed: 0
  device: "auto"
  checkpoint_score_heuristic_weight: 2.0
  use_horizontal_symmetry_augmentation: true
  value_loss_coef: 1.0
  max_grad_norm: 5.0
  anneal_learning_rate: true
  root_noise_each_move: true
  tactical_eval_examples: 96

# MCTS Baseline Configuration
mcts:
  simulations: 100
  exploration_weight: 1.0
  use_heuristic_rollout: true

# Evaluation and Logging
evaluation:
  games_per_matchup: 20
  calculate_elo: true
  log_dir: "./outputs"
  save_checkpoints: true
  checkpoint_freq: 50
  save_best_model: true
  save_game_traces: false
  record_game_videos: false

baselines:
  random:
    type: "random"
  heuristic:
    type: "heuristic"
  mcts:
    type: "mcts"
    simulations: 100

# Notebook-specific configurations for testing and development
notebook_settings:
  # Seed is inherited from global.seed if not specified here
  
  # Quick test configuration (reduced for rapid iteration)
  quick_test:
    episodes: 180
    eval_interval: 30
    eval_games: 12
    mcts_simulations: 30
    eval_mcts_simulations: 50
  
  # Test parameters for specific scenarios
  testing:
    baseline:
      games_per_pair: 20
    
    mcts:
      games_per_pair: 4
      default_simulations: 80
      simulation_sweep: [20, 40, 80, 120]
      sweep_games_per_pair: 20
    
    model_comparison:
      games_per_pair: 20  # Increase to 200 for final run
      mcts_simulations: 50  # Increase to 200 for final run
      validation_games_vs_random: 100
      validation_threshold: 0.95
  
  # Seeds for ablation studies
  ablation_seeds: [7, 17, 27]
  
  # Ablation variants configuration
  ablation_variants:
    dqn:
      - name: "base"
        params: {}
      - name: "more_updates"
        params:
          gradient_updates_per_step: 3
      - name: "no_symmetry"
        params:
          gradient_updates_per_step: 3
          use_horizontal_symmetry_augmentation: false
    
    ppo:
      - name: "base"
        params: {}
      - name: "robust_selection"
        params:
          eval_games: 32
          checkpoint_score_heuristic_weight: 6.0
          rollout_episodes_per_update: 14
      - name: "safer_self_play"
        params:
          learning_rate: 1.0e-4
          entropy_coeff: 0.01
          random_opponent_fraction: 0.0
          heuristic_opponent_fraction: 0.4
    
    alphazero: []  # No ablation variants for AlphaZero
